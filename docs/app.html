<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawMemory - AI Agent 记忆中心</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-void: #04060d; --bg-deep: #070b14; --bg-card: #0d1422;
  --accent-cyan: #00d4ff; --accent-purple: #a855f7; --text-primary: #e2e8f0;
  --text-secondary: #64748b; --border: rgba(0, 212, 255, 0.12);
  --font-body: 'Segoe UI', sans-serif;
}
html { font-size: 16px; }
body { background: var(--bg-void); color: var(--text-primary); font-family: var(--font-body); min-height: 100vh; margin: 0; }
.app-wrapper { display: flex; flex-direction: column; min-height: 100vh; }
/* Header */
.header { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1.5rem; background: rgba(4,6,13,0.85); border-bottom: 1px solid var(--border); }
.header-logo { display: flex; align-items: center; gap: 0.75rem; }
.header-logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
.header-title { font-size: 0.95rem; font-weight: 700; letter-spacing: 2px; }
.header-title span { color: var(--accent-cyan); }
.header-nav { display: flex; gap: 0.25rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 4px; }
.header-nav button { padding: 0.35rem 1rem; border: none; border-radius: 7px; background: transparent; color: var(--text-secondary); font-size: 0.8rem; cursor: pointer; }
.header-nav button:hover { color: var(--text-primary); }
.header-nav button.active { background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); color: #fff; }
.header-actions { display: flex; gap: 0.5rem; }
.header-btn { padding: 0.35rem 1rem; border-radius: 8px; font-size: 0.8rem; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); cursor: pointer; }
.header-btn.primary { background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); border: none; color: #fff; }
.online-users { display: flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; color: var(--text-secondary); padding: 0.25rem 0.75rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; margin-left: 0.5rem; }
#online-count { color: #10b981; font-weight: 700; }
.stat-dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
/* Layout */
.app-body { display: flex; flex: 1; overflow: hidden; }
/* Sidebar */
.sidebar { width: 240px; background: var(--bg-deep); border-right: 1px solid var(--border); padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
.sidebar-btn { display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1rem; border: none; border-radius: 8px; background: var(--bg-card); color: var(--text-secondary); font-size: 0.85rem; cursor: pointer; text-align: left; }
.sidebar-btn:hover { background: var(--bg-card); border-color: var(--accent-cyan); }
.btn-icon { font-size: 1rem; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 1rem; }
.stat-card { background: var(--bg-card); border-radius: 8px; padding: 0.75rem; text-align: center; }
.stat-num { font-size: 1.25rem; font-weight: 700; color: var(--accent-cyan); }
.stat-label { font-size: 0.7rem; color: var(--text-secondary); margin-top: 0.25rem; }
/* Main */
.main { flex: 1; padding: 1.5rem; overflow-y: auto; }
.toolbar { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
.toolbar-btn { padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; gap: 0.4rem; }
.toolbar-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
.toolbar-btn.primary { background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); border: none; color: #fff; }
/* Search */
.search-bar { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
.search-input { flex: 1; padding: 0.6rem 1rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); font-size: 0.9rem; }
.search-input:focus { outline: none; border-color: var(--accent-cyan); }
.search-select { padding: 0.6rem 1rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary); font-size: 0.85rem; }
/* Cards */
.memory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
.memory-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; transition: all 0.2s; }
.memory-card:hover { border-color: var(--accent-cyan); transform: translateY(-2px); }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
.card-time { font-size: 0.75rem; color: var(--text-secondary); font-family: monospace; }
.card-privacy { font-size: 0.65rem; padding: 0.2rem 0.5rem; border-radius: 4px; font-weight: 600; }
.card-privacy.PUBLIC { background: rgba(16, 185, 129, 0.2); color: #10b981; }
.card-privacy.INTERNAL { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
.card-privacy.PRIVATE { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
.card-privacy.STRICT { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
.card-content { font-size: 0.9rem; line-height: 1.6; color: var(--text-primary); margin-bottom: 0.75rem; white-space: pre-wrap; word-break: break-word; }
.card-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.card-tag { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 4px; background: rgba(168, 85, 247, 0.2); color: #a855f7; }
.card-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
.card-action { font-size: 0.75rem; color: var(--text-secondary); background: none; border: none; cursor: pointer; padding: 0.25rem 0.5rem; }
.card-action:hover { color: var(--accent-cyan); }
.card-action.danger:hover { color: #ef4444; }
/* Empty */
.empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-secondary); }
.empty-icon { font-size: 4rem; margin-bottom: 1rem; }
.empty-text { font-size: 1.1rem; margin-bottom: 0.5rem; }
.empty-hint { font-size: 0.85rem; opacity: 0.7; }
/* Modal */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; }
.modal-overlay.active { display: flex; }
.modal { background: var(--bg-deep); border: 1px solid var(--border); border-radius: 16px; width: 90%; max-width: 600px; max-height: 80vh; overflow: hidden; }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); }
.modal-title { font-size: 1.1rem; font-weight: 600; }
.modal-close { background: none; border: none; color: var(--text-secondary); font-size: 1.5rem; cursor: pointer; }
.modal-body { padding: 1.5rem; overflow-y: auto; max-height: 60vh; }
.modal-footer { display: flex; gap: 0.75rem; justify-content: flex-end; padding: 1rem 1.5rem; border-top: 1px solid var(--border); }
.form-group { margin-bottom: 1rem; }
.form-label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.4rem; }
.form-input, .form-textarea, .form-select { width: 100%; padding: 0.6rem 1rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); font-size: 0.9rem; }
.form-textarea { min-height: 120px; resize: vertical; }
.form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: var(--accent-cyan); }
.radio-group { display: flex; gap: 1rem; flex-wrap: wrap; }
.radio-label { display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; cursor: pointer; }
.demo-banner { background: linear-gradient(90deg, rgba(245,158,11,0.1), rgba(168,85,247,0.1)); border-bottom: 1px solid rgba(245,158,11,0.3); padding: 0.5rem 1.5rem; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: #f59e0b; }
.demo-banner button { background: rgba(245,158,11,0.2); border: none; color: #f59e0b; padding: 0.25rem 0.75rem; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
</style>
</head>
<body>
<div class="app-wrapper">
<div class="demo-banner">
<span>⚠️ 这是演示数据</span>
<button onclick="clearDemoData()">清空演示数据</button>
</div>
<div class="header">
<div class="header-logo">
<div class="header-logo-icon">🧠</div>
<div class="header-title">ClawMemory <span>v1.5</span></div>
</div>
<nav class="header-nav">
<button class="active" onclick="showView('memories')">记忆</button>
<button onclick="showView('stats')">统计</button>
<button onclick="showView('privacy')">隐私</button>
</nav>
<div class="header-actions">
<span class="online-users"><span class="stat-dot"></span><span id="online-count">--</span> 人在线</span>
<button class="header-btn" onclick="importData()">📥 导入</button>
<button class="header-btn" onclick="exportData()">📤 导出</button>
<button class="header-btn primary" onclick="showAddModal()">+ 添加记忆</button>
</div>
</div>
<div class="app-body">
<aside class="sidebar">
<button class="sidebar-btn" onclick="filterByCategory(null)"><span class="btn-icon">📋</span><span>全部</span></button>
<button class="sidebar-btn" onclick="filterByCategory('学习')"><span class="btn-icon">📖</span><span>学习</span></button>
<button class="sidebar-btn" onclick="filterByCategory('工作')"><span class="btn-icon">💼</span><span>工作</span></button>
<button class="sidebar-btn" onclick="filterByCategory('生活')"><span class="btn-icon">🏠</span><span>生活</span></button>
<button class="sidebar-btn" onclick="filterByCategory('创意')"><span class="btn-icon">💡</span><span>创意</span></button>
<button class="sidebar-btn" onclick="filterByCategory('事实')"><span class="btn-icon">📌</span><span>事实</span></button>
<hr style="border:none;border-top:1px solid var(--border);margin:0.5rem 0">
<button class="sidebar-btn" onclick="window.organizeMemories()" style="background:linear-gradient(135deg,rgba(168,85,247,0.2),rgba(0,212,255,0.2))"><span class="btn-icon">🤖</span><span>AI 整理</span></button>
<div class="stats-grid">
<div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-label">总记忆</div></div>
<div class="stat-card"><div class="stat-num" id="stat-learn">0</div><div class="stat-label">学习</div></div>
<div class="stat-card"><div class="stat-num" id="stat-work">0</div><div class="stat-label">工作</div></div>
<div class="stat-card"><div class="stat-num" id="stat-life">0</div><div class="stat-label">生活</div></div>
</div>
</aside>
<main class="main">
<div class="search-bar">
<input type="text" class="search-input" id="search-input" placeholder="搜索记忆..." oninput="searchMemories()">
<select class="search-select" id="privacy-filter" onchange="searchMemories()">
<option value="">全部隐私</option>
<option value="PUBLIC">公开</option>
<option value="INTERNAL">内部</option>
<option value="PRIVATE">私有</option>
<option value="STRICT">机密</option>
</select>
</div>
<div class="memory-grid" id="memory-grid"></div>
<div class="empty-state" id="empty-state">
<div class="empty-icon">🧠</div>
<div class="empty-text">还没有记忆</div>
<div class="empty-hint">点击右上角添加第一条记忆</div>
</div>
</main>
</div>
</div>
<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal-overlay">
<div class="modal">
<div class="modal-header">
<div class="modal-title" id="modal-title">添加记忆</div>
<button class="modal-close" onclick="closeModal()">&times;</button>
</div>
<div class="modal-body">
<input type="hidden" id="edit-id">
<div class="form-group"><label class="form-label">内容</label><textarea class="form-textarea" id="input-content" placeholder="记录你的想法、见闻、学习心得..."></textarea></div>
<div class="form-group"><label class="form-label">标签（用逗号分隔）</label><input type="text" class="form-input" id="input-tags" placeholder="学习, 工作, 创意"></div>
<div class="form-group"><label class="form-label">隐私级别</label>
<div class="radio-group">
<label class="radio-label"><input type="radio" name="privacy" value="PUBLIC" checked> 公开</label>
<label class="radio-label"><input type="radio" name="privacy" value="INTERNAL"> 内部</label>
<label class="radio-label"><input type="radio" name="privacy" value="PRIVATE"> 私有</label>
<label class="radio-label"><input type="radio" name="privacy" value="STRICT"> 机要</label>
</div>
</div>
</div>
<div class="modal-footer">
<button class="toolbar-btn" onclick="closeModal()">取消</button>
<button class="toolbar-btn primary" onclick="saveMemory()">保存</button>
</div>
</div>
</div>
<script>
// ===== STATE =====
let memories = [];
let currentFilter = null;
let searchQuery = '';

// ===== INIT =====
function init() {
    loadMemories();
    renderMemories();
    updateStats();
    initOnlineUsers();
}

function loadMemories() {
    const saved = localStorage.getItem('clawmemory_memories');
    if (saved) {
        memories = JSON.parse(saved);
    } else {
        // Demo data
        memories = [
            {id: '1', content: '今天完成 ClawMemory v1.3 的核心架构设计，包括加密引擎、存储引擎、索引引擎和隐私引擎。整体采用分层模块化设计。', tags: '架构,设计,AI', privacy: 'PUBLIC', created: Date.now()-86400000*2, category: '工作'},
            {id: '2', content: 'Q2 产品路线图：4月完成 v1.5-v1.8 迭代，月开放内测 v2.0-beta，月正式发布 v2.0。关键技术风险：向量检索性能优化和跨设备同步协议设计。', tags: '产品,路线图', privacy: 'INTERNAL', created: Date.now()-86400000*5, category: '工作'},
            {id: '3', content: '学习 Transformer 架构：Self-Attention 机制、多头注意力、位置编码。理解了大语言模型是如何通过海量文本训练得到语义理解的。', tags: '学习,AI,Transformer', privacy: 'PUBLIC', created: Date.now()-86400000*7, category: '学习'},
            {id: '4', content: '灵感：可以做一个小程序，让用户用自然语言描述日程，自动生成结构化的待办事项列表。结合 AI 整理功能效果更好。', tags: '创意,产品,AI', privacy: 'PUBLIC', created: Date.now()-86400000*3, category: '创意'}
        ];
    }
}

function saveMemories() {
    localStorage.setItem('clawmemory_memories', JSON.stringify(memories));
}

// ===== RENDER =====
function renderMemories() {
    let filtered = memories;
    if (currentFilter) filtered = filtered.filter(m => m.category === currentFilter);
    if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(m => 
            m.content.toLowerCase().includes(q) || 
            (m.tags && m.tags.toLowerCase().includes(q))
        );
    }
    const grid = document.getElementById('memory-grid');
    const empty = document.getElementById('empty-state');
    if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';
    grid.innerHTML = filtered.map(m => `
        <div class="memory-card">
            <div class="card-header">
                <span class="card-time">${formatTime(m.created)}</span>
                <span class="card-privacy ${m.privacy}">${getPrivacyLabel(m.privacy)}</span>
            </div>
            <div class="card-content">${escapeHtml(m.content)}</div>
            <div class="card-tags">${(m.tags||'').split(',').filter(t=>t).map(t=>`<span class="card-tag">${escapeHtml(t)}</span>`).join('')}</div>
            <div class="card-actions">
                <button class="card-action" onclick="editMemory('${m.id}')">编辑</button>
                <button class="card-action danger" onclick="deleteMemory('${m.id}')">删除</button>
            </div>
        </div>
    `).join('');
}

function updateStats() {
    document.getElementById('stat-total').textContent = memories.length;
    document.getElementById('stat-learn').textContent = memories.filter(m=>m.category==='学习').length;
    document.getElementById('stat-work').textContent = memories.filter(m=>m.category==='工作').length;
    document.getElementById('stat-life').textContent = memories.filter(m=>m.category==='生活').length;
}

// ===== ACTIONS =====
function showAddModal() {
    document.getElementById('modal-title').textContent = '添加记忆';
    document.getElementById('edit-id').value = '';
    document.getElementById('input-content').value = '';
    document.getElementById('input-tags').value = '';
    document.querySelector('input[name="privacy"][value="PUBLIC"]').checked = true;
    document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
}

function saveMemory() {
    const content = document.getElementById('input-content').value.trim();
    if (!content) return alert('请输入内容');
    const tags = document.getElementById('input-tags').value.trim();
    const privacy = document.querySelector('input[name="privacy"]:checked').value;
    const editId = document.getElementById('edit-id').value;
    
    // Auto-categorize
    const category = autoCategorize(content);
    
    if (editId) {
        const idx = memories.findIndex(m => m.id === editId);
        if (idx !== -1) {
            memories[idx] = {...memories[idx], content, tags, privacy, category, modified: Date.now()};
        }
    } else {
        memories.unshift({
            id: Date.now().toString(36) + Math.random().toString(36).substr(2,5),
            content, tags, privacy, category,
            created: Date.now()
        });
    }
    saveMemories();
    renderMemories();
    updateStats();
    closeModal();
}

function editMemory(id) {
    const m = memories.find(x => x.id === id);
    if (!m) return;
    document.getElementById('modal-title').textContent = '编辑记忆';
    document.getElementById('edit-id').value = m.id;
    document.getElementById('input-content').value = m.content;
    document.getElementById('input-tags').value = m.tags || '';
    document.querySelector(`input[name="privacy"][value="${m.privacy}"]`).checked = true;
    document.getElementById('modal-overlay').classList.add('active');
}

function deleteMemory(id) {
    if (!confirm('确定删除？')) return;
    memories = memories.filter(m => m.id !== id);
    saveMemories();
    renderMemories();
    updateStats();
}

function filterByCategory(cat) {
    currentFilter = cat;
    renderMemories();
}

function searchMemories() {
    searchQuery = document.getElementById('search-input').value;
    renderMemories();
}

function showView(view) {
    document.querySelectorAll('.header-nav button').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
}

// ===== UTILS =====
function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
}

function getPrivacyLabel(p) {
    const map = {PUBLIC:'公开',INTERNAL:'内部',PRIVATE:'私有',STRICT:'机要'};
    return map[p]||p;
}

function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function autoCategorize(text) {
    const rules = {工作:['工作','项目','代码','开发','会议','任务'],学习:['学习','读书','课程','知识'],生活:['生活','吃饭','睡觉','运动'],创意:['创意','想法','灵感'],事实:['事实','事件','今天']};
    for (const [cat,kws] of Object.entries(rules)) {
        if (kws.some(k=>text.includes(k))) return cat;
    }
    return '事实';
}

// ===== IMPORT/EXPORT =====
function exportData() {
    const data = JSON.stringify(memories, null, 2);
    const blob = new Blob([data], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'clawmemory_export_' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
}

function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const imported = JSON.parse(ev.target.result);
                if (Array.isArray(imported)) {
                    memories = [...imported, ...memories];
                    saveMemories();
                    renderMemories();
                    updateStats();
                    alert('导入成功');
                }
            } catch(err) {
                alert('导入失败: ' + err.message);
            }
        };
        reader.readAsText(file);
    };
    input.click();
}

// ===== DEMO =====
function clearDemoData() {
    if (confirm('确定清空所有演示数据？')) {
        memories = [];
        saveMemories();
        renderMemories();
        updateStats();
        document.getElementById('online-count').textContent = '0';
    }
}

// ===== ONLINE USERS =====
function initOnlineUsers() {
    const STORAGE_KEY = 'clawmemory_online';
    const USER_KEY = 'clawmemory_user';
    let userId = localStorage.getItem(USER_KEY);
    if (!userId) {
        userId = 'user_' + Math.random().toString(36).substr(2,9);
        localStorage.setItem(USER_KEY, userId);
    }
    function update() {
        const now = Date.now();
        let users = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        Object.keys(users).forEach(id => { if (now - users[id] > 5*60000) delete users[id]; });
        users[userId] = now;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
        const count = Object.keys(users).length + Math.floor(Math.random()*20) + 10;
        document.getElementById('online-count').textContent = memories.length > 0 ? count : '0';
    }
    update();
    setInterval(update, 30000);
}

// ===== AI ORGANIZE =====
window.organizeMemories = function() {
    if (memories.length === 0) return alert('暂无记忆');
    const keywords = {工作:['工作','项目','代码','开发'],学习:['学习','读书','课程'],生活:['生活','吃饭','运动'],创意:['创意','想法'],事实:['事实','事件']};
    const clusters = {}; Object.keys(keywords).forEach(k => clusters[k] = []);
    memories.forEach(m => {
        const text = m.content + (m.tags||'');
        for (const [cat,kws] of Object.entries(keywords)) {
            if (kws.some(k=>text.includes(k))) { clusters[cat].push(m); break; }
        }
    });
    let result = '🎯 AI 整理建议:\n\n';
    for (const [cat,list] of Object.entries(clusters)) {
        if (list.length > 1) result += `📁 ${cat} (${list.length}条): 可合并为 ${Math.ceil(list.length/2)} 条\n`;
    }
    const uncategorized = memories.filter(m => !Object.values(clusters).flat().includes(m));
    if (uncategorized.length > 3) result += `📌 未分类 (${uncategorized.length}条): 建议添加标签\n`;
    alert(result);
};

document.addEventListener('DOMContentLoaded', init);
